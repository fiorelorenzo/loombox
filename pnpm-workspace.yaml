packages:
  - 'apps/*'
  - 'packages/*'
  - 'packages/providers/*'
  - 'tooling/*'
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - node-pty
allowBuilds:
  # Both are optional native addons ssh2 uses only for hardware-accelerated
  # crypto detection; ssh2 falls back to its pure-JS path without them
  # (verified: `require('ssh2')` loads and connects fine with these unbuilt),
  # so skipping their build scripts keeps the supply-chain policy
  # conservative (no arbitrary install-time scripts run) at no functional cost.
  cpu-features: false
  better-sqlite3: true
  esbuild: true
  ssh2: false
  # Unlike ssh2's optional accelerators above, node-pty's native addon is not
  # optional: `@loombox/supervisor`'s interactive PTY terminals (SPEC §7.5;
  # issues #172/#173/#174) require it to actually spawn a PTY, so its build
  # script must run (verified: builds cleanly on this devbox's Node 22 + the
  # GitHub Actions Linux runner's build toolchain).
  node-pty: true
  # Windows-only NSIS-installer builder, a transitive dep of electron-builder
  # (`apps/desktop`, issue #403); apps/desktop only ever targets mac (dmg/zip
  # — see `apps/desktop/electron-builder.yml`), so its build script is never
  # functionally needed here — skipped, same conservative policy as ssh2/
  # cpu-features above.
  electron-winstaller: false
minimumReleaseAgeExclude:
  - svelte-check@4.7.3
  - vite@8.1.5
