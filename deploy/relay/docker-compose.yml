# loombox relay - prodbox deployment (#105).
#
# Modeled on the operator's pitchbox compose pattern: the app binds to a
# loopback-published port and host Caddy fronts it with TLS. Postgres holds only
# routing metadata + opaque ciphertext (the relay is a blind router, #315).
#
# Run from this directory (deploy/relay/) so `.env` is picked up:
#   docker compose up -d --build
# The relay self-migrates on boot; there is no separate migrate step.
#
# .env (chmod 600, never committed) must define: POSTGRES_PASSWORD,
# BETTER_AUTH_SECRET, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET. See .env.example.
#
# Redis fan-out (#97) is opt-in, for running more than one relay replica:
# the `redis` service below is behind the `redis` compose profile, off by
# default. To enable it:
#   docker compose --profile redis up -d --build
# and set REDIS_URL=redis://redis:6379 in .env. A single relay instance
# (the default) never needs this — it uses in-process fan-out. See
# docs/deploy-relay.md.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loombox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: loombox
    volumes:
      - loombox-pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U loombox -d loombox']
      interval: 5s
      timeout: 5s
      retries: 12

  relay:
    build:
      # context is the repo root so pnpm can resolve the workspace
      context: ../..
      dockerfile: packages/relay/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_URL: postgresql://loombox:${POSTGRES_PASSWORD}@postgres:5432/loombox
      RELAY_PUBLIC_URL: ${RELAY_PUBLIC_URL:-https://relay.loombox.dev}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?set GITHUB_CLIENT_ID in .env}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:?set GITHUB_CLIENT_SECRET in .env}
      # GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET are optional; omit to disable Google login.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Optional (#97): unset -> in-process, single-instance fan-out
      # (default, unchanged). Set to redis://redis:6379 (and bring up the
      # `redis` profile below) only when running more than one relay replica.
      REDIS_URL: ${REDIS_URL:-}
    ports:
      # loopback-only publish; host Caddy reverse-proxies to this (prodbox
      # UFW+Docker caveat: a 0.0.0.0 publish would bypass UFW).
      - '127.0.0.1:5185:8787'
    volumes:
      # Encrypted backup artifacts (#103, docs/relay-backup.md) land here so
      # they survive `relay` container recreation and are reachable from the
      # host for off-box shipping (rclone/restic).
      - ./backups:/app/backups
    restart: unless-stopped

  # Opt-in (#97): only started with `docker compose --profile redis up`.
  # Carries the same opaque wire-message payloads the relay already
  # forwards over `/ws` — never plaintext (the relay stays blind on Redis
  # exactly as it is on the socket).
  redis:
    image: redis:7-alpine
    profiles: ['redis']
    restart: unless-stopped

volumes:
  loombox-pg-data:
